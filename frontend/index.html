<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accenture Legal AI - RAG Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b1120;
            --glass-bg: rgba(23, 37, 84, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent-primary: #a855f7;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #09090b);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .dashboard {
            width: 90vw;
            height: 85vh;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        /* Header */
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Chat History */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 20px;
            border-radius: 16px;
            animation: slideUp 0.4s ease-out forwards;
        }

        .user-message {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2));
            align-self: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.03);
            align-self: flex-start;
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            width: 100%;
        }

        /* Response Dashboard Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            text-align: center;
        }

        .metric-title {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .sources-list {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .source-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            margin-right: 6px;
            margin-top: 5px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        .source-tag:hover {
            background: rgba(168, 85, 247, 0.1);
            color: var(--text-main);
            transform: translateY(-1px);
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.1);
        }

        #query-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #query-input:focus {
            border-color: var(--accent-primary);
        }

        #send-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            width: 54px;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
        }

        #send-btn:hover {
            transform: scale(1.04);
            filter: brightness(1.1);
        }

        /* Loaders */
        .loader {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
        }
        .dot {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes opacity-pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes bounce { to { transform: translateY(-8px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <div class="logo">
                <i class="fa-solid fa-scale-balanced"></i> Acc_Legal_AI
            </div>
            <div class="status-badge">
                <i class="fa-solid fa-circle"></i> Service Connected
            </div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="message bot-message">
                Welcome to Accenture Legal Analytics Hub. Submit a query regarding financial reports or compliance below to activate the RAG pipeline view.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="query-input" placeholder="Ask about Section 1A Risks, Revenue comparative analyses..." autocomplete="off">
            <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');

        async function submitQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            // 1. Append User Message
            appendMessage(query, 'user-message');
            queryInput.value = '';

            // 2. Append Layout Loader
            const loaderId = 'load-' + Date.now();
            appendMessage(`
                <div class="loader">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
                <div style="font-size: 0.8rem; color: #94a3b8; text-align: center; margin-top: 8px;">Spawning RAG microservice...</div>
            `, 'bot-message', loaderId);

            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                // 3. Call Node.js Gateway API
                const response = await fetch('http://localhost:5000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();
                document.getElementById(loaderId).remove();

                if (data.error) throw new Error(data.error);

                // 4. Render Rich Dashboard Response
                const answerHTML = `
                    <div style="line-height: 1.6; margin-bottom: 12px;">${data.answer.replace(/\n/g, '<br>')}</div>
                    
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <div class="metric-title">🛡️ CRAG Safety</div>
                            <div class="metric-value" style="color: ${data.answer.includes("Reject") ? '#f59e0b' : '#10b981'}">
                                ${data.answer.includes("Reject") ? "Fallback" : "Proceed"}
                            </div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">📊 Faithfulness</div>
                            <div class="metric-value">${data.scores.faithfulness || 0}/5</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">🎯 Relevance</div>
                            <div class="metric-value">${data.scores.relevance || 0}/5</div>
                        </div>
                    </div>

                    ${data.sources && data.sources.length > 0 ? `
                        <div class="sources-list">
                            <strong>📚 Cited Citations/Node Ids:</strong><br>
                            ${data.sources.map(s => `<span class="source-tag" title="${s}">#${String(s).substring(0, 8)}</span>`).join('')}
                        </div>
                    ` : ''}

                    ${data.scores.justification ? `
                        <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px; font-style: italic;">
                            Judge Feedback: "${data.scores.justification}"
                        </div>
                    ` : ''}
                `;

                appendMessage(answerHTML, 'bot-message');

            } catch (err) {
                document.getElementById(loaderId).remove();
                appendMessage(`⚠️ Error processing request: ${err.message}`, 'bot-message', null, true);
            }

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendMessage(content, className, id = null, isError = false) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            if (id) div.id = id;
            if (isError) div.style.borderColor = '#ef4444';
            div.innerHTML = content;
            chatArea.appendChild(div);
        }

        sendBtn.addEventListener('click', submitQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitQuery();
        });
    </script>

</body>
</html>
